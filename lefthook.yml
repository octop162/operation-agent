pre-commit:
  parallel: true
  commands:
    ruff-check:
      glob: "*.py"
      run: uv run ruff check src/ tests/ --fix
    ruff-format:
      glob: "*.py"
      run: uv run ruff format src/ tests/
    mypy:
      glob: "*.py"
      run: uv run mypy src/

pre-push:
  commands:
    block-main-push:
      run: |
        current_branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$current_branch" = "main" ]; then
          echo "ERROR: mainブランチへの直接のpushは禁止されています。プルリクエストを作成してください。"
          exit 1
        fi
    pytest:
      run: uv run pytest tests/
